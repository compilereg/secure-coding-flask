<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Coding Demo - Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 50px; text-align: center; }
        .login-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; width: 300px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 96%; padding: 10px; background-color: #007BFF; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        #error-msg { color: red; margin-top: 10px; font-size: 14px; }
    </style>
    <script>
	    function visitpage() {
		fetch('http://192.168.56.11:5000/priv')
  		.then(response => response.text())
  		.then(data => {
    		document.getElementById('content-area').innerHTML = data;
				    console.log(data);
  		});
		}
    </script>
</head>
<body  onload="visitpage();">

<div class="login-card">
    <h2>System Login</h2>
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button onclick="handleLogin()">Login</button>
    <div id="error-msg"></div>
</div>

<script>
async function handleLogin() {
    const userVal = document.getElementById('username').value;
    const passVal = document.getElementById('password').value;
    const errorDiv = document.getElementById('error-msg');
    errorDiv.innerText = ""; // Reset error display

    try {
        const response = await fetch('http://192.168.56.11:5000/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `username=${encodeURIComponent(userVal)}&password=${encodeURIComponent(passVal)}`
        });

        if (response.ok) {
            // Note: If using cookie-based tracking, Flask sets the cookie in the header.
            // If the cookie lacks HttpOnly, the browser registers it implicitly here.
            window.location.href = 'listnews.html';
        } else {
            errorDiv.innerText = "Invalid credentials standard refusal.";
        }
    } catch (err) {
        errorDiv.innerText = "Connection failure to authentication server.";
        console.error(err);
    }
}
</script>

</body>
</html>
